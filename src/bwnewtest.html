<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>MightyMC | Event Bracket</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f0c29; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --win-green: #0e9d58;
            --lose-line: #d93025;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .main-zoom-container {
            transform: scale(0.68);
            transform-origin: center;
            display: flex; flex-direction: column; align-items: center;
        }

       
        .header {
            text-align: center; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        .header-content {
            display: flex; align-items: center; gap: 15px;
        }

        .server-logo {
            width: 85px; 
            height: auto; 
            display: block;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .server-title {
            font-size: 3.5rem; font-weight: 800; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center;
        }

        .sub-title { font-size: 1.2rem; background: rgba(0,0,0,0.3); padding: 5px 20px; border-radius: 20px; }

        .tournament-wrapper { display: flex; gap: 40px; align-items: flex-start; }

        .round { display: flex; flex-direction: column; gap: 15px; }
        .round-2 { padding-top: 45px; gap: 110px; } 
        .round-3 { padding-top: 125px; gap: 300px; }
        .round-4 { padding-top: 250px; display: flex; flex-direction: column; gap: 50px; }

        .round-name {
            text-align: center; font-size: 0.7rem; text-transform: uppercase;
            font-weight: 800; opacity: 0.8; margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1); padding: 5px; border-radius: 5px;
        }

        .match-unit { width: 190px; display: flex; flex-direction: column; gap: 3px; }

        .team-box {
            background: var(--card-bg);
            height: 42px;
            display: flex; align-items: center;
            cursor: pointer; border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: 0.3s; overflow: hidden;
            border: 2px solid transparent;
        }

        .team-box input {
            width: 100%; height: 100%; border: none; background: none;
            text-align: center; font-weight: 600; font-size: 0.85rem;
            color: #333; outline: none; font-family: inherit;
        }

        .status-win { background-color: var(--win-green) !important; border-color: transparent !important; }
        .status-win input { color: #ffffff !important; }
        .status-lose { background-color: var(--lose-line) !important; border-color: transparent !important; }
        .status-lose input { color: #ffffff !important; }

        .podium-container {
            margin-top: 20px; display: flex; align-items: flex-end; gap: 15px;
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rank-card { width: 180px; text-align: center; padding: 10px; background: white; border-radius: 10px; display: flex; flex-direction: column; gap: 5px; }
        .top-1 { height: 190px; border-top: 6px solid gold; order: 2; }
        .top-2 { height: 150px; border-top: 6px solid #bdc3c7; order: 1; }
        .top-3 { height: 130px; border-top: 6px solid #cd7f32; order: 3; }
        .rank-label { font-weight: 800; color: #333; }
        .crown { font-size: 2.2rem; display: block; }
    </style>
</head>
<body>

    <div class="main-zoom-container">
        <div class="header">
            <div class="header-content">
                <img src="./assets/Mighty.png" alt="MightyMC Logo" class="server-logo">
                <h1 class="server-title">MIGHTYMC</h1>
            </div>
            <div class="sub-title">Ranked BedWars Events</div>
        </div>

        <div class="tournament-wrapper">
            <div class="round">
                <div class="round-name">Round of 16</div>
                <script>
                    for(let i=1; i<=16; i+=2) {
                        document.write(`<div class="match-unit">
                            <div class="team-box"><input type="text" placeholder="Team ${i}"></div>
                            <div class="team-box"><input type="text" placeholder="Team ${i+1}"></div>
                        </div>`);
                    }
                </script>
            </div>

            <div class="round round-2">
                <div class="round-name">Quarter Finals</div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="Winner M1"></div><div class="team-box"><input type="text" placeholder="Winner M2"></div></div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="Winner M3"></div><div class="team-box"><input type="text" placeholder="Winner M4"></div></div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="Winner M5"></div><div class="team-box"><input type="text" placeholder="Winner M6"></div></div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="Winner M7"></div><div class="team-box"><input type="text" placeholder="Winner M8"></div></div>
            </div>

            <div class="round round-3">
                <div class="round-name">Semi Finals</div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="SF 1"></div><div class="team-box"><input type="text" placeholder="SF 2"></div></div>
                <div class="match-unit"><div class="team-box"><input type="text" placeholder="SF 3"></div><div class="team-box"><input type="text" placeholder="SF 4"></div></div>
            </div>

            <div class="round-4">
                <div>
                    <div class="round-name" style="background: gold; color: black;">Grand Final</div>
                    <div class="match-unit">
                        <div class="team-box" style="border-color: gold; height: 50px;"><input type="text" placeholder="Winner SF 1/2"></div>
                        <div class="team-box" style="border-color: gold; height: 50px;"><input type="text" placeholder="Winner SF 3/4"></div>
                    </div>
                </div>

                <div>
                    <div class="round-name" style="background: #cd7f32; color: white;">3rd Place Match</div>
                    <div class="match-unit">
                        <div class="team-box" style="border-color: #cd7f32; height: 50px;"><input type="text" placeholder="Loser SF 1/2"></div>
                        <div class="team-box" style="border-color: #cd7f32; height: 50px;"><input type="text" placeholder="Loser SF 3/4"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="podium-container">
            <div class="rank-card top-2 team-box">
                <div class="rank-label">🥈 TOP 2</div>
                <input type="text" placeholder="Runner Up">
            </div>
            <div class="rank-card top-1 team-box">
                <span class="crown">🏆</span>
                <div class="rank-label">TOP 1</div>
                <input type="text" placeholder="CHAMPION">
            </div>
            <div class="rank-card top-3 team-box">
                <div class="rank-label">🥉 TOP 3</div>
                <input type="text" placeholder="3rd Place">
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.team-box').forEach(box => {
            box.addEventListener('click', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (this.classList.contains('status-win')) {
                    this.classList.remove('status-win');
                    this.classList.add('status-lose');
                } else if (this.classList.contains('status-lose')) {
                    this.classList.remove('status-lose');
                } else {
                    this.classList.add('status-win');
                }
            });
        });
    </script>
</body>
</html>
